
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alterlife_backend
    ports:
      - "8000:8000"

    environment:
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000
      # Gerçek değerleri buraya ekleyin veya backend/.env dosyası oluşturun
    networks:
      - alterlife_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alterlife_frontend
    ports:
      - "3000:3000"

    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - alterlife_network
    restart: unless-stopped

networks:
  alterlife_network:
    driver: bridge
